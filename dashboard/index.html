<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cistern Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 24px;
            color: #38bdf8;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }

        /* Water level gauge */
        .gauge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }
        .gauge {
            width: 120px;
            height: 200px;
            border: 3px solid #334155;
            border-radius: 0 0 60px 60px;
            position: relative;
            overflow: hidden;
            background: #0f172a;
        }
        .gauge-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, #0369a1, #38bdf8);
            transition: height 1s ease;
            border-radius: 0 0 57px 57px;
        }
        .gauge-label {
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 16px;
            color: #38bdf8;
        }
        .gauge-sublabel {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat {
            background: #0f172a;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f8fafc;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Chart */
        .chart-container {
            width: 100%;
            height: 200px;
            position: relative;
        }
        canvas { width: 100% !important; height: 100% !important; }

        /* Status */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #1e293b;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-dot.online { background: #22c55e; }
        .status-dot.offline { background: #ef4444; }
        .status-text { font-size: 0.875rem; color: #94a3b8; }

        .last-updated { font-size: 0.75rem; color: #475569; text-align: center; margin-top: 12px; }

        /* Loading */
        .loading { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#x1F4A7; Cistern Monitor</h1>

        <div class="status-bar">
            <div>
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Connecting...</span>
            </div>
            <span class="status-text" id="lastSeen"></span>
        </div>

        <div class="card">
            <div class="gauge-container">
                <div class="gauge">
                    <div class="gauge-fill" id="gaugeFill" style="height: 0%"></div>
                </div>
                <div class="gauge-label" id="levelPct">--%</div>
                <div class="gauge-sublabel" id="levelDepth">-- m</div>
            </div>
        </div>

        <div class="card">
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="voltage">--</div>
                    <div class="stat-label">Voltage</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="rawAdc">--</div>
                    <div class="stat-label">Raw ADC</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 12px; color: #94a3b8; font-size: 0.875rem;">Last 24 Hours</h3>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <div class="last-updated" id="updatedAt"></div>
    </div>

    <script>
        // Firebase config - replace with your values
        const FIREBASE_PROJECT_ID = 'YOUR_PROJECT_ID';
        const FIREBASE_API_KEY = 'YOUR_API_KEY';

        const FIRESTORE_BASE = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents`;

        // Fetch latest reading
        async function fetchLatest() {
            const url = `${FIRESTORE_BASE}/readings?key=${FIREBASE_API_KEY}&orderBy=timestamp desc&pageSize=1`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.documents && data.documents.length > 0) {
                    return parseDoc(data.documents[0]);
                }
            } catch (e) {
                console.error('Fetch error:', e);
            }
            return null;
        }

        // Fetch last 24h of readings
        async function fetchHistory() {
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const url = `${FIRESTORE_BASE}/readings?key=${FIREBASE_API_KEY}&orderBy=timestamp asc&where.fieldFilter.field.fieldPath=timestamp&where.fieldFilter.op=GREATER_THAN_OR_EQUAL&where.fieldFilter.value.timestampValue=${since}`;
            
            try {
                // Simpler query - just get recent docs
                const url2 = `${FIRESTORE_BASE}/readings?key=${FIREBASE_API_KEY}&orderBy=timestamp desc&pageSize=288`;
                const res = await fetch(url2);
                const data = await res.json();
                if (data.documents) {
                    return data.documents.map(parseDoc).reverse();
                }
            } catch (e) {
                console.error('History fetch error:', e);
            }
            return [];
        }

        function parseDoc(doc) {
            const f = doc.fields;
            return {
                voltage: parseFloat(f.voltage?.doubleValue || 0),
                depth_m: parseFloat(f.depth_m?.doubleValue || 0),
                depth_pct: parseFloat(f.depth_pct?.doubleValue || 0),
                raw: parseInt(f.raw?.integerValue || 0),
                timestamp: new Date(f.timestamp?.timestampValue || 0)
            };
        }

        // Update the UI
        function updateUI(reading) {
            if (!reading) {
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').textContent = 'No data';
                return;
            }

            // Check if reading is recent (within 5 minutes)
            const age = Date.now() - reading.timestamp.getTime();
            const isOnline = age < 5 * 60 * 1000;

            document.getElementById('statusDot').className = `status-dot ${isOnline ? 'online' : 'offline'}`;
            document.getElementById('statusText').textContent = isOnline ? 'Online' : 'Offline';
            document.getElementById('lastSeen').textContent = timeAgo(reading.timestamp);

            document.getElementById('gaugeFill').style.height = `${reading.depth_pct}%`;
            document.getElementById('levelPct').textContent = `${reading.depth_pct.toFixed(1)}%`;
            document.getElementById('levelDepth').textContent = `${reading.depth_m.toFixed(2)} m`;
            document.getElementById('voltage').textContent = `${reading.voltage.toFixed(3)}V`;
            document.getElementById('rawAdc').textContent = reading.raw;
            document.getElementById('updatedAt').textContent = `Last updated: ${reading.timestamp.toLocaleString()}`;
        }

        function timeAgo(date) {
            const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
            if (seconds < 60) return `${seconds}s ago`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            return `${Math.floor(seconds / 86400)}d ago`;
        }

        // Simple canvas chart
        function drawChart(readings) {
            const canvas = document.getElementById('chart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);

            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;
            const pad = { top: 10, right: 10, bottom: 25, left: 35 };
            const chartW = w - pad.left - pad.right;
            const chartH = h - pad.top - pad.bottom;

            // Clear
            ctx.clearRect(0, 0, w, h);

            if (readings.length < 2) {
                ctx.fillStyle = '#64748b';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Waiting for data...', w / 2, h / 2);
                return;
            }

            const maxPct = 100;
            const minPct = 0;

            // Grid lines
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = pad.top + (chartH / 4) * i;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();

                ctx.fillStyle = '#475569';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`${100 - i * 25}%`, pad.left - 5, y + 4);
            }

            // Time labels
            ctx.fillStyle = '#475569';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            const first = readings[0].timestamp;
            const last = readings[readings.length - 1].timestamp;
            ctx.fillText(first.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), pad.left, h - 5);
            ctx.fillText(last.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), w - pad.right, h - 5);

            // Line
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 2;
            ctx.beginPath();
            readings.forEach((r, i) => {
                const x = pad.left + (i / (readings.length - 1)) * chartW;
                const y = pad.top + chartH - (r.depth_pct / maxPct) * chartH;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // Fill under line
            const lastX = pad.left + chartW;
            const lastY = pad.top + chartH - (readings[readings.length - 1].depth_pct / maxPct) * chartH;
            ctx.lineTo(lastX, pad.top + chartH);
            ctx.lineTo(pad.left, pad.top + chartH);
            ctx.closePath();
            ctx.fillStyle = 'rgba(56, 189, 248, 0.1)';
            ctx.fill();
        }

        // Init
        async function init() {
            const latest = await fetchLatest();
            updateUI(latest);

            const history = await fetchHistory();
            drawChart(history);

            // Refresh every 60 seconds
            setInterval(async () => {
                const r = await fetchLatest();
                updateUI(r);
                const h = await fetchHistory();
                drawChart(h);
            }, 60000);
        }

        init();
    </script>
</body>
</html>
