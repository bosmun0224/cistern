<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cistern Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 24px;
            color: #38bdf8;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .card h3 {
            margin-bottom: 12px;
            color: #94a3b8;
            font-size: 0.875rem;
        }

        /* Horizontal cylinder tank */
        .tank-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
        }
        .tank-svg {
            width: 100%;
            max-width: 360px;
        }
        .tank-labels {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .tank-label {
            text-align: center;
        }
        .tank-label-value {
            font-size: 2rem;
            font-weight: 700;
            color: #38bdf8;
        }
        .tank-label-unit {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 2px;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        .stat {
            background: #0f172a;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f8fafc;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Device telemetry */
        .telemetry {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 8px;
        }
        .telem-item {
            background: #0f172a;
            border-radius: 10px;
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s;
        }
        .telem-item.active {
            border-color: var(--series-color, #38bdf8);
        }
        .telem-icon {
            font-size: 1.1rem;
            margin-bottom: 2px;
        }
        .telem-value {
            font-size: 1rem;
            font-weight: 600;
            color: #f8fafc;
        }
        .telem-label {
            font-size: 0.65rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .rssi-bar {
            display: inline-flex;
            gap: 2px;
            align-items: flex-end;
            height: 14px;
        }
        .rssi-bar span {
            display: inline-block;
            width: 3px;
            background: #334155;
            border-radius: 1px;
        }
        .rssi-bar span.active { background: #22c55e; }
        .rssi-bar span:nth-child(1) { height: 4px; }
        .rssi-bar span:nth-child(2) { height: 7px; }
        .rssi-bar span:nth-child(3) { height: 10px; }
        .rssi-bar span:nth-child(4) { height: 14px; }

        /* Chart */
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .chart-header h3 { margin-bottom: 0; }
        .range-btns {
            display: flex;
            gap: 4px;
        }
        .range-btn {
            background: #0f172a;
            border: 1px solid #334155;
            color: #94a3b8;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .range-btn.active {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: 600;
        }
        .chart-container {
            width: 100%;
            height: 200px;
            position: relative;
        }
        canvas { width: 100% !important; height: 100% !important; }
        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Status */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #1e293b;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-dot.online { background: #22c55e; }
        .status-dot.offline { background: #ef4444; }
        .status-text { font-size: 0.875rem; color: #94a3b8; }

        .last-updated { font-size: 0.75rem; color: #475569; text-align: center; margin-top: 12px; }
        .firmware-version { position: fixed; bottom: 8px; right: 12px; font-size: 0.65rem; color: #475569; }
        .last-error { position: fixed; bottom: 8px; left: 12px; font-size: 0.65rem; color: #ef4444; max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Alert banner */
        .alert-banner {
            background: #7f1d1d;
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            display: none;
        }
        .alert-banner.visible { display: block; }
        .alert-banner .alert-title {
            font-weight: 700;
            color: #fca5a5;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .alert-banner .alert-msg {
            color: #fecaca;
            font-size: 0.8rem;
            line-height: 1.4;
        }
        .notif-btn {
            background: #334155;
            border: 1px solid #475569;
            color: #94a3b8;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 8px;
        }
        .notif-btn:hover { background: #475569; color: #e2e8f0; }
        .notif-btn.enabled { background: #166534; border-color: #22c55e; color: #bbf7d0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#x1F4A7; Cistern Monitor</h1>

        <div class="status-bar">
            <div>
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Connecting...</span>
            </div>
            <span class="status-text" id="lastSeen"></span>
        </div>

        <!-- Alert banner -->
        <div class="alert-banner" id="alertBanner">
            <div class="alert-title" id="alertTitle">⚠️ Device Offline</div>
            <div class="alert-msg" id="alertMsg"></div>
            <button class="notif-btn" id="notifBtn" onclick="requestNotifications()">&#x1F514; Enable Notifications</button>
        </div>

        <!-- Horizontal cylinder tank -->
        <div class="card">
            <div class="tank-container">
                <svg class="tank-svg" viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <clipPath id="tankClip">
                            <path d="M60,10 L340,10 C370,10 390,40 390,90 C390,140 370,170 340,170 L60,170 C30,170 10,140 10,90 C10,40 30,10 60,10 Z"/>
                        </clipPath>
                        <linearGradient id="waterGrad" x1="0" y1="1" x2="0" y2="0">
                            <stop offset="0%" stop-color="#0369a1"/>
                            <stop offset="100%" stop-color="#38bdf8"/>
                        </linearGradient>
                    </defs>
                    <!-- Tank outline -->
                    <path d="M60,10 L340,10 C370,10 390,40 390,90 C390,140 370,170 340,170 L60,170 C30,170 10,140 10,90 C10,40 30,10 60,10 Z"
                          fill="#0f172a" stroke="#334155" stroke-width="3"/>
                    <!-- Water fill (clipped to tank shape) -->
                    <g clip-path="url(#tankClip)">
                        <rect id="waterFill" x="0" y="170" width="400" height="0" fill="url(#waterGrad)" opacity="0.85"/>
                        <!-- Wave line at water surface -->
                        <path id="wavePath" d="" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none"/>
                    </g>
                    <!-- Ribs (decorative lines like the Norwesco tank) -->
                    <g stroke="#334155" stroke-width="1" opacity="0.4">
                        <line x1="80" y1="12" x2="80" y2="168"/>
                        <line x1="130" y1="12" x2="130" y2="168"/>
                        <line x1="180" y1="12" x2="180" y2="168"/>
                        <line x1="230" y1="12" x2="230" y2="168"/>
                        <line x1="280" y1="12" x2="280" y2="168"/>
                        <line x1="320" y1="12" x2="320" y2="168"/>
                    </g>
                    <!-- Percentage text centered in tank -->
                    <text id="tankPctText" x="200" y="95" text-anchor="middle" dominant-baseline="central"
                          font-size="36" font-weight="700" fill="#e2e8f0" style="text-shadow: 0 2px 8px rgba(0,0,0,0.6);">--%</text>
                </svg>
                <div class="tank-labels">
                    <div class="tank-label">
                        <div class="tank-label-value" id="gallonsDisplay">--</div>
                        <div class="tank-label-unit">gallons</div>
                    </div>
                    <div class="tank-label">
                        <div class="tank-label-value" id="depthDisplay">--</div>
                        <div class="tank-label-unit">inches</div>
                    </div>
                </div>
            </div>
        </div>


        <div class="card">
            <div class="chart-header">
                <h3>Water Level</h3>
                <div class="range-btns" id="waterRangeBtns">
                    <button class="range-btn" data-hours="1">1h</button>
                    <button class="range-btn" data-hours="6">6h</button>
                    <button class="range-btn" data-hours="12">12h</button>
                    <button class="range-btn active" data-hours="24">24h</button>
                    <button class="range-btn" data-hours="168">7d</button>
                    <button class="range-btn" data-hours="336">14d</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <div class="card" id="deviceChartCard" style="display:none;">
            <div class="chart-header">
                <h3>Device Health</h3>
                <div class="range-btns" id="deviceRangeBtns">
                    <button class="range-btn" data-hours="1">1h</button>
                    <button class="range-btn" data-hours="6">6h</button>
                    <button class="range-btn" data-hours="12">12h</button>
                    <button class="range-btn active" data-hours="24">24h</button>
                    <button class="range-btn" data-hours="168">7d</button>
                    <button class="range-btn" data-hours="336">14d</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="deviceChart"></canvas>
            </div>
            <div class="chart-legend" id="deviceLegend"></div>
        </div>

        <!-- Device telemetry -->
        <div class="card" id="telemetryCard" style="display:none;">
            <h3>Device</h3>
            <div class="telemetry" id="telemetryGrid">
                <div class="telem-item active" data-series="rssi" style="--series-color:#22c55e">
                    <div class="telem-icon" id="rssiIcon">
                        <div class="rssi-bar">
                            <span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                    <div class="telem-value" id="rssiValue">--</div>
                    <div class="telem-label">WiFi</div>
                </div>
                <div class="telem-item" data-series="cpu_temp" style="--series-color:#fb923c">
                    <div class="telem-icon">&#x1F321;</div>
                    <div class="telem-value" id="cpuValue">--</div>
                    <div class="telem-label">Temp</div>
                </div>
                <div class="telem-item" data-series="free_mem" style="--series-color:#a78bfa">
                    <div class="telem-icon">&#x1F4BE;</div>
                    <div class="telem-value" id="memValue">--</div>
                    <div class="telem-label">RAM</div>
                </div>
                <div class="telem-item" data-series="storage_pct" style="--series-color:#f472b6">
                    <div class="telem-icon">&#x1F4C1;</div>
                    <div class="telem-value" id="storageValue">--</div>
                    <div class="telem-label">Storage</div>
                </div>
            </div>
        </div>

        <div class="last-updated" id="updatedAt"></div>
    </div>
    <div class="firmware-version" id="fwVersion"></div>
    <div class="last-error" id="lastError" style="display:none"></div>

    <script>
        // ---- Config ----
        const FIREBASE_PROJECT_ID = 'cistern-blomquist';
        const FIREBASE_API_KEY = 'AIzaSyCMvUgbaUvekblMsrPx7Pg9sPrmgB4iPk4';
        const FIRESTORE_BASE = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents`;

        // ---- Calibration defaults (overridden by Firestore /config/calibration) ----
        let TANK_HEIGHT_IN = 65.5;
        let TANK_STRAIGHT_IN = 38.0;
        let TANK_DOME_R_IN = 27.5;
        let TANK_LENGTH_IN = 133.0;
        let TANK_MAX_GAL   = 1500;
        let V_MIN = 0.884;
        let V_MAX = 4.40;
        let DEPTH_MAX_M = 5.0;
        const M_TO_IN = 39.3701;

        async function loadCalibration() {
            try {
                const url = `${FIRESTORE_BASE}/config/calibration?key=${FIREBASE_API_KEY}`;
                const res = await fetch(url);
                if (!res.ok) return;
                const data = await res.json();
                const f = data.fields;
                if (f.v_min) V_MIN = parseFloat(f.v_min.doubleValue);
                if (f.v_max) V_MAX = parseFloat(f.v_max.doubleValue);
                if (f.depth_max_m) DEPTH_MAX_M = parseFloat(f.depth_max_m.doubleValue);
                if (f.tank_height_in) TANK_HEIGHT_IN = parseFloat(f.tank_height_in.doubleValue);
                if (f.tank_straight_in) TANK_STRAIGHT_IN = parseFloat(f.tank_straight_in.doubleValue);
                if (f.tank_dome_r_in) TANK_DOME_R_IN = parseFloat(f.tank_dome_r_in.doubleValue);
                if (f.tank_length_in) TANK_LENGTH_IN = parseFloat(f.tank_length_in.doubleValue);
                if (f.tank_max_gal) TANK_MAX_GAL = parseInt(f.tank_max_gal.integerValue);
                console.log('Calibration loaded from Firestore');
            } catch (e) {
                console.warn('Using default calibration:', e);
            }
        }

        // ---- Derived calculations (all client-side) ----
        function voltageToDepth(voltage) {
            const v = Math.max(V_MIN, Math.min(V_MAX, voltage));
            const depth_m = ((v - V_MIN) / (V_MAX - V_MIN)) * DEPTH_MAX_M;
            const depth_in = depth_m * M_TO_IN;
            return { depth_m, depth_in };
        }

        function depthToGallons(depth_in) {
            const h = Math.max(0, Math.min(TANK_HEIGHT_IN, depth_in));
            if (h <= 0) return 0;
            if (h >= TANK_HEIGHT_IN) return TANK_MAX_GAL;
            // Dome is semicircle R=TANK_DOME_R_IN; width tapers as sqrt(R²-y²)
            // Total effective height = straight + dome_effective
            // dome cumulative area integral: (y/2)*sqrt(1-(y/R)²) + (R/2)*arcsin(y/R)
            // dome total area integral at y=R: pi*R/4
            const R = TANK_DOME_R_IN;
            const domeTotal = Math.PI * R / 4;  // effective dome height in "full-width inches"
            const effectiveH = TANK_STRAIGHT_IN + domeTotal;
            const galPerIn = TANK_MAX_GAL / effectiveH;
            if (h <= TANK_STRAIGHT_IN) {
                return h * galPerIn;
            }
            // In dome region
            const straightGal = TANK_STRAIGHT_IN * galPerIn;
            const y = h - TANK_STRAIGHT_IN;  // 0..R
            const domeCum = (y / 2) * Math.sqrt(1 - (y / R) * (y / R)) + (R / 2) * Math.asin(y / R);
            return straightGal + domeCum * galPerIn;
        }

        function depthToPercent(depth_in) {
            return (depthToGallons(depth_in) / TANK_MAX_GAL) * 100;
        }

        function enrichReading(raw) {
            const { depth_m, depth_in } = voltageToDepth(raw.voltage);
            const clamped_in = Math.min(depth_in, TANK_HEIGHT_IN);
            const gallons = depthToGallons(clamped_in);
            const depth_pct = depthToPercent(clamped_in);
            return { ...raw, depth_m, depth_in: clamped_in, gallons, depth_pct };
        }

        // ---- Firestore API ----
        let allHistory = [];   // full cache of fetched readings
        let waterRangeHours = 24;
        let deviceRangeHours = 24;

        async function fetchLatest() {
            const url = `${FIRESTORE_BASE}/readings?key=${FIREBASE_API_KEY}&orderBy=timestamp desc&pageSize=1`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.documents && data.documents.length > 0) {
                    return enrichReading(parseDoc(data.documents[0]));
                }
            } catch (e) { console.error('Fetch error:', e); }
            return null;
        }

        async function fetchHistory() {
            // Fetch up to 4032 readings (14 days × 12/hr × 24h)
            try {
                const url = `${FIRESTORE_BASE}/readings?key=${FIREBASE_API_KEY}&orderBy=timestamp desc&pageSize=4032`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.documents) {
                    allHistory = data.documents.map(d => enrichReading(parseDoc(d))).reverse();
                    return allHistory;
                }
            } catch (e) { console.error('History fetch error:', e); }
            return [];
        }

        function filterByHours(readings, hours) {
            const cutoff = Date.now() - hours * 3600 * 1000;
            return readings.filter(r => r.timestamp.getTime() >= cutoff);
        }

        function parseDoc(doc) {
            const f = doc.fields;
            return {
                voltage: parseFloat(f.voltage?.doubleValue || 0),
                raw: parseInt(f.raw?.integerValue || 0),
                timestamp: new Date(f.timestamp?.timestampValue || 0),
                rssi: f.rssi ? parseInt(f.rssi.integerValue) : null,
                free_mem: f.free_mem ? parseInt(f.free_mem.integerValue) : null,
                cpu_temp: f.cpu_temp ? parseFloat(f.cpu_temp.doubleValue || f.cpu_temp.integerValue) : null,
                total_storage: f.total_storage ? parseInt(f.total_storage.integerValue) : null,
                used_storage: f.used_storage ? parseInt(f.used_storage.integerValue) : null,
                version: f.version ? f.version.stringValue : null,
                last_error: f.last_error ? f.last_error.stringValue : null,
            };
        }

        // ---- Tank SVG ----
        function updateTankFill(pct) {
            // pct is volume-based; map back to physical depth for visual fill
            const targetGal = (pct / 100) * TANK_MAX_GAL;
            let lo = 0, hi = TANK_HEIGHT_IN;
            for (let i = 0; i < 30; i++) {
                const mid = (lo + hi) / 2;
                if (depthToGallons(mid) < targetGal) lo = mid;
                else hi = mid;
            }
            const depth_in = (lo + hi) / 2;
            const svgH = 160;
            const fillH = (depth_in / TANK_HEIGHT_IN) * svgH;
            const fillY = 170 - fillH;

            document.getElementById('waterFill').setAttribute('y', fillY);
            document.getElementById('waterFill').setAttribute('height', fillH);

            const wave = document.getElementById('wavePath');
            if (fillH > 2) {
                let d = `M10,${fillY}`;
                for (let x = 10; x <= 390; x += 10) {
                    d += ` Q${x + 5},${fillY - 3} ${x + 10},${fillY}`;
                }
                wave.setAttribute('d', d);
            } else {
                wave.setAttribute('d', '');
            }

            document.getElementById('tankPctText').textContent = `${pct.toFixed(0)}%`;
        }

        // ---- RSSI bars ----
        function updateRssiBars(rssi) {
            const bars = document.querySelectorAll('#rssiIcon .rssi-bar span');
            let level = 0;
            if (rssi !== null) {
                if (rssi >= -50) level = 4;
                else if (rssi >= -60) level = 3;
                else if (rssi >= -70) level = 2;
                else level = 1;
            }
            bars.forEach((bar, i) => bar.classList.toggle('active', i < level));
        }

        function formatBytes(bytes) {
            if (bytes == null) return '--';
            if (bytes < 1024) return bytes + 'B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + 'K';
            return (bytes / (1024 * 1024)).toFixed(1) + 'M';
        }

        // ---- UI Update ----
        function updateUI(reading) {
            if (!reading) {
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').textContent = 'No data';
                return;
            }

            const age = Date.now() - reading.timestamp.getTime();
            const isOnline = age < 5 * 60 * 1000;

            document.getElementById('statusDot').className = `status-dot ${isOnline ? 'online' : 'offline'}`;
            document.getElementById('statusText').textContent = isOnline ? 'Online' : 'Offline';
            document.getElementById('lastSeen').textContent = timeAgo(reading.timestamp);

            updateTankFill(reading.depth_pct);
            document.getElementById('gallonsDisplay').textContent = Math.round(reading.gallons);
            document.getElementById('depthDisplay').textContent = reading.depth_in.toFixed(1);

            document.getElementById('updatedAt').textContent = `Last updated: ${reading.timestamp.toLocaleString()}`;

            if (reading.version) {
                document.getElementById('fwVersion').textContent = `fw ${reading.version}`;
            }

            // Last error indicator
            const errEl = document.getElementById('lastError');
            if (reading.last_error) {
                errEl.textContent = reading.last_error;
                errEl.style.display = 'block';
            } else {
                errEl.style.display = 'none';
            }

            // Device telemetry (all as percentages)
            const hasTelemetry = reading.rssi !== null || reading.free_mem !== null;
            document.getElementById('telemetryCard').style.display = hasTelemetry ? 'block' : 'none';
            if (hasTelemetry) {
                // WiFi: -90dBm=0%, -30dBm=100%
                if (reading.rssi !== null) {
                    const rssiPct = Math.round(Math.max(0, Math.min(100, (reading.rssi + 90) / 60 * 100)));
                    document.getElementById('rssiValue').textContent = `${rssiPct}%`;
                } else {
                    document.getElementById('rssiValue').textContent = '--';
                }
                updateRssiBars(reading.rssi);

                // CPU temp: 0-70°C scale
                if (reading.cpu_temp !== null) {
                    const tempPct = Math.round(Math.min(100, (reading.cpu_temp / 70) * 100));
                    document.getElementById('cpuValue').textContent = `${tempPct}%`;
                } else {
                    document.getElementById('cpuValue').textContent = '--';
                }

                // RAM: used as % of ~264KB total
                if (reading.free_mem !== null) {
                    const ramUsedPct = Math.round(Math.min(100, ((264000 - reading.free_mem) / 264000) * 100));
                    document.getElementById('memValue').textContent = `${ramUsedPct}%`;
                } else {
                    document.getElementById('memValue').textContent = '--';
                }

                // Storage: used %
                if (reading.total_storage !== null && reading.used_storage !== null) {
                    const pct = Math.round((reading.used_storage / reading.total_storage) * 100);
                    document.getElementById('storageValue').textContent = `${pct}%`;
                } else {
                    document.getElementById('storageValue').textContent = '--';
                }
            }
        }

        function timeAgo(date) {
            const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
            if (seconds < 60) return `${seconds}s ago`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            return `${Math.floor(seconds / 86400)}d ago`;
        }

        // ---- Chart: Water Level ----
        function drawChart(readings, rangeHours) {
            const canvas = document.getElementById('chart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);

            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;
            const pad = { top: 10, right: 10, bottom: 25, left: 40 };
            const chartW = w - pad.left - pad.right;
            const chartH = h - pad.top - pad.bottom;

            ctx.clearRect(0, 0, w, h);

            // Fixed time window: (now - range) to now
            const tMax = Date.now();
            const tMin = tMax - rangeHours * 3600000;

            const maxGal = TANK_MAX_GAL;
            const steps = 4;

            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            for (let i = 0; i <= steps; i++) {
                const y = pad.top + (chartH / steps) * i;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();

                ctx.fillStyle = '#475569';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`${maxGal - (maxGal / steps) * i}`, pad.left - 5, y + 4);
            }

            drawTimeLabels(ctx, tMin, tMax, rangeHours, pad, w, h);

            if (readings.length < 2) {
                ctx.fillStyle = '#64748b';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Waiting for data...', w / 2, h / 2);
                return;
            }

            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            readings.forEach(r => {
                const t = r.timestamp.getTime();
                if (t < tMin || t > tMax) return;
                const x = pad.left + ((t - tMin) / (tMax - tMin)) * chartW;
                const y = pad.top + chartH - (r.gallons / maxGal) * chartH;
                if (!started) { ctx.moveTo(x, y); started = true; }
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            if (started) {
                // Fill under the line
                const lastR = readings.filter(r => r.timestamp.getTime() >= tMin).pop();
                const lastX = pad.left + ((lastR.timestamp.getTime() - tMin) / (tMax - tMin)) * chartW;
                ctx.lineTo(lastX, pad.top + chartH);
                const firstR = readings.find(r => r.timestamp.getTime() >= tMin);
                const firstX = pad.left + ((firstR.timestamp.getTime() - tMin) / (tMax - tMin)) * chartW;
                ctx.lineTo(firstX, pad.top + chartH);
                ctx.closePath();
                ctx.fillStyle = 'rgba(56, 189, 248, 0.1)';
                ctx.fill();
            }
        }

        // ---- Chart: Device Health (single selected series) ----
        let activeDeviceSeries = 'rssi';  // default selected

        const DEVICE_SERIES = [
            { key: 'rssi',    label: 'WiFi RSSI',  color: '#22c55e', unit: 'dBm',
              normalize: v => v != null ? (Math.max(-90, Math.min(-30, v)) + 90) / 60 : null },
            { key: 'free_mem', label: 'Free RAM',   color: '#a78bfa', unit: 'KB',
              normalize: v => v != null ? Math.min(v / 200000, 1) : null },
            { key: 'cpu_temp', label: 'Temp',       color: '#fb923c', unit: '°C',
              normalize: v => v != null ? Math.min(v / 70, 1) : null },
            { key: 'storage_pct', label: 'Storage %', color: '#f472b6', unit: '%',
              normalize: v => v != null ? v / 100 : null },
        ];

        function drawDeviceChart(readings, rangeHours) {
            const card = document.getElementById('deviceChartCard');
            const hasTelem = allHistory.some(r => r.rssi !== null || r.free_mem !== null);
            card.style.display = hasTelem ? 'block' : 'none';
            if (!hasTelem) return;

            // Add storage_pct to readings
            readings.forEach(r => {
                r.storage_pct = (r.total_storage && r.used_storage)
                    ? (r.used_storage / r.total_storage) * 100 : null;
            });

            const canvas = document.getElementById('deviceChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);

            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;
            const pad = { top: 10, right: 10, bottom: 25, left: 10 };
            const chartW = w - pad.left - pad.right;
            const chartH = h - pad.top - pad.bottom;

            ctx.clearRect(0, 0, w, h);

            // Fixed time window
            const tMax = Date.now();
            const tMin = tMax - rangeHours * 3600000;

            if (readings.length < 2) {
                ctx.fillStyle = '#64748b';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Waiting for data...', w / 2, h / 2);
                return;
            }

            // Grid lines (0%, 50%, 100%)
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 2; i++) {
                const y = pad.top + (chartH / 2) * i;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();
            }

            drawTimeLabels(ctx, tMin, tMax, rangeHours, pad, w, h);

            // Draw only the active series
            const series = DEVICE_SERIES.find(s => s.key === activeDeviceSeries) || DEVICE_SERIES[0];
            ctx.strokeStyle = series.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            readings.forEach(r => {
                const val = series.normalize(r[series.key]);
                if (val === null) return;
                const t = r.timestamp.getTime();
                if (t < tMin || t > tMax) return;
                const x = pad.left + ((t - tMin) / (tMax - tMin)) * chartW;
                const y = pad.top + chartH - val * chartH;
                if (!started) { ctx.moveTo(x, y); started = true; }
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // Fill under line
            if (started) {
                const inRange = readings.filter(r => r.timestamp.getTime() >= tMin && r.timestamp.getTime() <= tMax);
                if (inRange.length) {
                    const lastX = pad.left + ((inRange[inRange.length - 1].timestamp.getTime() - tMin) / (tMax - tMin)) * chartW;
                    const firstX = pad.left + ((inRange[0].timestamp.getTime() - tMin) / (tMax - tMin)) * chartW;
                    ctx.lineTo(lastX, pad.top + chartH);
                    ctx.lineTo(firstX, pad.top + chartH);
                    ctx.closePath();
                    ctx.fillStyle = series.color.replace(')', ', 0.1)').replace('rgb', 'rgba');
                    // Use hex with alpha
                    ctx.fillStyle = series.color + '1a';
                    ctx.fill();
                }
            }

            // Remove legend (boxes serve as legend now)
            document.getElementById('deviceLegend').innerHTML = '';
        }

        // ---- Shared time axis labels ----
        function drawTimeLabels(ctx, tMin, tMax, rangeHours, pad, w, h) {
            ctx.fillStyle = '#475569';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            const fmt = rangeHours > 48
                ? { month: 'short', day: 'numeric' }
                : { hour: '2-digit', minute: '2-digit' };
            const first = new Date(tMin);
            const mid = new Date((tMin + tMax) / 2);
            const last = new Date(tMax);
            ctx.fillText(first.toLocaleString([], fmt), pad.left, h - 5);
            ctx.fillText(mid.toLocaleString([], fmt), (pad.left + w - pad.right) / 2, h - 5);
            ctx.fillText(last.toLocaleString([], fmt), w - pad.right, h - 5);
        }

        // ---- Range button handlers ----
        function setupRangeButtons(containerId, onChange) {
            const container = document.getElementById(containerId);
            container.addEventListener('click', (e) => {
                const btn = e.target.closest('.range-btn');
                if (!btn) return;
                container.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                onChange(parseInt(btn.dataset.hours));
            });
        }

        function redrawCharts() {
            drawChart(filterByHours(allHistory, waterRangeHours), waterRangeHours);
            drawDeviceChart(filterByHours(allHistory, deviceRangeHours), deviceRangeHours);
        }

        // ---- Alerts ----
        const OFFLINE_THRESHOLD_MS = 30 * 60 * 1000; // 30 minutes
        const LOW_VOLTAGE = 0.5;
        let lastNotifiedAlert = null; // track to avoid repeated notifications

        function checkAlerts(reading) {
            const banner = document.getElementById('alertBanner');
            const title = document.getElementById('alertTitle');
            const msg = document.getElementById('alertMsg');

            if (!reading) {
                showAlert(banner, title, msg, '⚠️ No Data', 'No readings available from the device.');
                return;
            }

            const age = Date.now() - reading.timestamp.getTime();
            const alerts = [];

            if (age > OFFLINE_THRESHOLD_MS) {
                const mins = Math.floor(age / 60000);
                const label = mins >= 60 ? `${Math.floor(mins / 60)}h ${mins % 60}m` : `${mins}m`;
                alerts.push({ title: '⚠️ Device Offline', msg: `No data received for ${label}. Check power and WiFi.` });
            }

            if (reading.voltage < LOW_VOLTAGE) {
                alerts.push({ title: '⚠️ Low Voltage', msg: `Sensor voltage is ${reading.voltage.toFixed(3)}V (threshold: ${LOW_VOLTAGE}V).` });
            }

            if (alerts.length > 0) {
                const combined = alerts.map(a => a.msg).join(' ');
                showAlert(banner, title, msg, alerts[0].title, combined);

                // Send browser notification (once per alert state change)
                const alertKey = alerts.map(a => a.title).join('|');
                if (alertKey !== lastNotifiedAlert && Notification.permission === 'granted') {
                    new Notification('Cistern Monitor', { body: combined, icon: '💧' });
                    lastNotifiedAlert = alertKey;
                }
            } else {
                banner.classList.remove('visible');
                lastNotifiedAlert = null;
            }

            updateNotifButton();
        }

        function showAlert(banner, titleEl, msgEl, titleText, msgText) {
            titleEl.textContent = titleText;
            msgEl.textContent = msgText;
            banner.classList.add('visible');
        }

        function requestNotifications() {
            if (!('Notification' in window)) {
                alert('Browser notifications are not supported.');
                return;
            }
            Notification.requestPermission().then(updateNotifButton);
        }

        function updateNotifButton() {
            const btn = document.getElementById('notifBtn');
            if (!('Notification' in window)) {
                btn.textContent = 'Notifications not supported';
                btn.disabled = true;
                return;
            }
            if (Notification.permission === 'granted') {
                btn.textContent = '🔔 Notifications On';
                btn.classList.add('enabled');
            } else if (Notification.permission === 'denied') {
                btn.textContent = '🔕 Notifications Blocked';
                btn.disabled = true;
            } else {
                btn.textContent = '🔔 Enable Notifications';
                btn.classList.remove('enabled');
            }
        }

        // ---- Init ----
        async function init() {
            await loadCalibration();

            setupRangeButtons('waterRangeBtns', h => { waterRangeHours = h; redrawCharts(); });
            setupRangeButtons('deviceRangeBtns', h => { deviceRangeHours = h; redrawCharts(); });

            // Telemetry box click → select series for device chart
            document.getElementById('telemetryGrid').addEventListener('click', (e) => {
                const item = e.target.closest('.telem-item');
                if (!item || !item.dataset.series) return;
                document.querySelectorAll('.telem-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                activeDeviceSeries = item.dataset.series;
                redrawCharts();
            });

            const latest = await fetchLatest();
            updateUI(latest);
            checkAlerts(latest);
            updateNotifButton();

            await fetchHistory();
            redrawCharts();

            setInterval(async () => {
                const r = await fetchLatest();
                updateUI(r);
                checkAlerts(r);
                await fetchHistory();
                redrawCharts();
            }, 60000);
        }

        init();
    </script>
</body>
